name: Test Runner

on:
  workflow_call:
    inputs:
      platform:
        type: string
        required: true
        description: "Platform: linux-x64, linux-aarch64, windows, windows-arm64, macos"
      backend:
        type: string
        required: true
        description: "Backend: cpu, cuda"
      torch_version:
        type: string
        required: true
        description: "PyTorch version to install"
      pypi_index:
        type: string
        default: "https://download.pytorch.org/whl/cpu"
        description: "PyPI index URL for torch installation"
      cuda_version:
        type: string
        default: ""
        description: "CUDA version (required for cuda backend)"
      gpu_type:
        type: string
        default: ""
        description: "GPU type for CUDA testing: T4, A10,L40S"
      # cpu_type currently only affects linux x64 CPU testing to select specific CPU architectures
      cpu_type:
        type: string
        default: ""
        description: "CPU architecture for testing: icelake, cascadelake (default: platform default runner)"
env:
  BNB_SKIP_CMAKE: 1

jobs:
  build:
    runs-on: >-
      ${{
        inputs.platform == 'linux-x64' && 'ubuntu-22.04' ||
        inputs.platform == 'linux-aarch64' && 'ubuntu-22.04-arm' ||
        inputs.platform == 'macos' && 'macos-15' ||
        inputs.platform == 'windows-arm64' && 'windows-11-arm' ||
        'windows-2025'
      }}
    outputs:
      test_runner: ${{ steps.config.outputs.test_runner }}
      artifact_name: ${{ steps.config.outputs.artifact_name }}
    steps:
      - name: Configure test runner and paths
        id: config
        shell: bash
        run: |
          # Map platform to test runner
          case "${{ inputs.platform }}" in
            linux-x64)
              if [[ "${{ inputs.backend }}" == "cuda" ]]; then
                case "${{ inputs.gpu_type }}" in
                  T4)    TEST_RUNNER="bandb-aws-g4dn-4xlarge-plus-use1-public-80" ;;
                  A10)   TEST_RUNNER="bandb-aws-g5-4xlarge-plus-use1-public-80" ;;
                  L40S)  TEST_RUNNER="bandb-aws-g6e-4xlarge-plus-use1-public-80" ;;
                  *)     echo "::error::Must specify gpu_type (T4, A10, L40S) for linux-x64 cuda backend"; exit 1 ;;
                esac
              else
                case "${{ inputs.cpu_type }}" in
                  icelake)     TEST_RUNNER="banb-aws-general-8-plus-use1-public-80" ;;
                  cascadelake) TEST_RUNNER="bandb-aws-g4dn-4xlarge-plus-use1-public-80" ;;
                  "")          TEST_RUNNER="ubuntu-22.04" ;;
                  *)           echo "::error::Invalid cpu_type: ${{ inputs.cpu_type }}"; exit 1 ;;
                esac
              fi
              ;;
            linux-aarch64) TEST_RUNNER="ubuntu-22.04-arm" ;;
            macos)         TEST_RUNNER="macos-15" ;;
            windows)
              [[ "${{ inputs.backend }}" == "cuda" ]] && TEST_RUNNER="CUDA-Windows-x64" || TEST_RUNNER="windows-2025"
              ;;
            windows-arm64) TEST_RUNNER="windows-11-arm" ;;
            *)
              echo "::error::Unsupported platform: ${{ inputs.platform }}"
              exit 1
              ;;
          esac

          # Create unique artifact name per configuration
          ARTIFACT="lib_${{ inputs.backend }}_${RUNNER_OS}_${RUNNER_ARCH}"
          [[ "${{ inputs.backend }}" == "cuda" ]] && ARTIFACT="${ARTIFACT}_${{ inputs.cuda_version }}_${{ inputs.gpu_type }}"
          [[ "${{ inputs.backend }}" == "cpu"  ]] && ARTIFACT="${ARTIFACT}_${{ inputs.cpu_type }}"
          ARTIFACT="${ARTIFACT}_torch${{ inputs.torch_version }}_${{ github.run_id }}_${{ github.run_attempt }}"

          echo "test_runner=${TEST_RUNNER}" >> $GITHUB_OUTPUT
          echo "artifact_name=${ARTIFACT}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3


      # Windows + CUDA: Install CUDA Toolkit
      - name: Install CUDA Toolkit
        if: inputs.backend == 'cuda' && inputs.platform == 'windows'
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76 # v0.2.35
        with:
          cuda: ${{ inputs.cuda_version }}
          method: "network"
          sub-packages: '["nvcc","cudart","cublas","thrust","nvrtc_dev","cublas_dev"]'
          use-github-cache: false

      # Windows: Setup MSVC (needed for both CPU and CUDA builds)
      - name: Setup MSVC
        if: startsWith(inputs.platform, 'windows')
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        with:
          arch: ${{ inputs.platform == 'windows-arm64' && 'arm64' || 'x64' }}
          toolset: ${{ (inputs.platform == 'windows' && inputs.backend == 'cuda') && '14.44' || '' }}

      # Build CPU backend
      - name: Build C++
        if: inputs.backend == 'cpu'
        run: bash .github/scripts/build-cpu.sh

      # Build CUDA backend
      - name: Build C++ / CUDA
        if: inputs.backend == 'cuda'
        run: bash .github/scripts/build-cuda.sh
        env:
          CUDA_VERSION: ${{ inputs.cuda_version }}
          CUDA_TARGETS: "75;80;89"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.config.outputs.artifact_name }}
          path: output/${{ runner.os }}/${{ runner.arch }}/*
          retention-days: 7
          if-no-files-found: error

  test:
    needs: build
    runs-on: ${{ needs.build.outputs.test_runner }}
    env:
      BNB_TEST_DEVICE: ${{ inputs.backend }}
    steps:
      # CUDA: Show GPU information
      - name: Show GPU Information
        if: inputs.backend == 'cuda'
        run: nvidia-smi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: bitsandbytes/
          merge-multiple: true

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          # Python for Windows ARM64 is only available from 3.12+
          python-version: ${{ inputs.platform == 'windows-arm64' && '3.12' || '3.10' }}

      # Windows: Setup MSVC for torch.compile
      - name: Setup MSVC
        if: startsWith(inputs.platform, 'windows')
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        with:
          arch: ${{ inputs.platform == 'windows-arm64' && 'arm64' || 'x64' }}

      - name: Install torch (nightly)
        if: inputs.torch_version == 'nightly'
        run: pip install --pre torch --index-url ${{ inputs.pypi_index }}

      - name: Install torch
        if: inputs.torch_version != 'nightly'
        run: pip install torch==${{ inputs.torch_version }} --index-url ${{ inputs.pypi_index }}

      - name: Install dependencies
        run: |
          pip install -e ".[test]" -v
          pip install pytest-cov

      - name: Show installed packages
        run: pip list

      - name: Show environment information
        run: python -m torch.utils.collect_env

      - name: Run tests
        run: pytest --durations=100
